<html lang="ja">
<head>

    <meta charset="UTF-8">

    <title>もちすけ日本縦断クリッカー -九州編-</title>
    <style>
        /* 全体スタイル */
        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
            background-color: #f5f5f5;
            touch-action: manipulation;
        }

        #game-screen {
            width: 100%; max-width: 480px; height: 100vh;
            position: relative; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background: url('bg_images/kagoshima.png') center/cover no-repeat;
        }

        #fade-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; opacity: 0; pointer-events: none; z-index: 9999;
            transition: opacity 0.3s ease;
        }
        .fade-black { opacity: 1 !important; }

        /* ステータスバー */
        #status-bar {
            width: 90%; background: rgba(255, 255, 255, 0.9);
            padding: 10px; margin-top: 15px; border-radius: 12px;
            text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.3s ease;
        }
        .text-large { font-size: 1.2rem; font-weight: bold; color: #333; margin: 2px 0; }
        #mps-display { font-size: 0.9rem; color: #666; font-weight: bold; }

        /* 🗺️ もちメーター（進行度プログレスバー） */
        #progress-container {
            width: 90%; height: 10px; background: #e0d7cc; border-radius: 5px;
            position: relative; margin: 12px auto 4px auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
        }
        #progress-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #ffb74d, #ff9800);
            border-radius: 5px; transition: width 0.1s linear;
        }
        #progress-icon {
            width: 26px; height: 26px; position: absolute; top: -8px; left: 0%;
            transform: translateX(-13px); transition: left 0.1s linear;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }

        .fever-active {
            background: linear-gradient(135deg, #fff176, #ffb74d) !important;
            box-shadow: 0 0 20px #ff9800 !important;
            animation: feverPulse 1s infinite alternate;
        }
        @keyframes feverPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        /* キャラクターエリア */
        #mochisuke-area {
            flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%;
        }
        
        #mochisuke-wrapper {
            position: relative; display: flex; justify-content: center; align-items: center;
        }

        #mochisuke-btn {
            width: 220px; height: auto; max-height: 250px;
            object-fit: contain; cursor: pointer; z-index: 5;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15));
        }

        /* もちすけの呼吸アニメーション */
        .breathe-idle { animation: breathe 2.5s infinite ease-in-out; }
        @keyframes breathe {
            0% { transform: scale(1, 1); }
            50% { transform: scale(1.03, 0.97); }
            100% { transform: scale(1, 1); }
        }

        /* タップ時のへこみ */
        .hekomi-anim { animation: hekomi 0.1s ease-out forwards; }
        @keyframes hekomi {
            0% { transform: scale(1); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15)) brightness(1); }
            40% { transform: scale(0.91); filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)) brightness(0.95); }
            100% { transform: scale(1); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15)) brightness(1); }
        }

        /* 放置時の吹き出し */
        #mochi-balloon {
            position: absolute; top: -50px; background: white;
            padding: 8px 12px; border-radius: 16px; font-size: 0.9rem; font-weight: bold;
            color: #5d4037; border: 3px solid #ff9800; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            white-space: nowrap; z-index: 10; opacity: 0; transform: scale(0.8);
            transition: all 0.2s ease-out; pointer-events: none;
        }
        #mochi-balloon::after {
            content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            border-width: 12px 8px 0; border-style: solid; border-color: white transparent; display: block; width: 0; z-index: 11;
        }
        #mochi-balloon::before {
            content: ''; position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
            border-width: 13px 9px 0; border-style: solid; border-color: #ff9800 transparent; display: block; width: 0; z-index: 9;
        }
        .balloon-show { opacity: 1 !important; transform: scale(1) !important; }

        /* 波紋（リップル）エフェクト */
        .ripple {
            position: absolute; border: 4px solid rgba(255, 152, 0, 0.6);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 999; animation: ripple-out 0.4s ease-out forwards;
        }
        @keyframes ripple-out {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 130px; height: 130px; opacity: 0; }
        }

        /* 🔢 浮き上がる文字エフェクト */
        .floating-text {
            position: absolute; color: #ff9800; font-weight: 900; font-size: 1.3rem; pointer-events: none;
            text-shadow: 2px 2px 0 white, -2px -2px 0 white, 2px -2px 0 white, -2px 2px 0 white;
            z-index: 1000; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        /* コンボ数表示 */
        #combo-display {
            position: absolute; top: 20px; font-size: 1.5rem; font-weight: 900;
            color: #ff3d00; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff;
            opacity: 0; transform: scale(0.5); transition: all 0.1s ease; z-index: 80;
            pointer-events: none;
        }
        .combo-bounce { opacity: 1 !important; transform: scale(1.2) !important; }

        /* 💥 劇的進化：物理演算で完全な放物線を描くクッキリパーティクル */
        .particle {
            position: absolute; width: 42px; height: 42px;
            background: url('mochi_particle.png') center/contain no-repeat;
            pointer-events: none; z-index: 998;
            will-change: transform; /* スマホでの描画をヌルヌルにするお守り */
        }

        /* 金もちボタン */
        #fever-pop {
            position: absolute; width: 65px; height: 65px;
            background: url('mochi_particle.png') center/contain no-repeat;
            filter: hue-rotate(45deg) brightness(1.3) drop-shadow(0 0 8px #ffeb3b);
            cursor: pointer; z-index: 90; display: flex; justify-content: center; align-items: center;
            font-size: 11px; font-weight: bold; color: #3e2723;
            animation: popSurprise 0.5s infinite alternate ease-in-out;
        }
        @keyframes popSurprise {
            0% { transform: scale(1) rotate(-5deg); }
            100% { transform: scale(1.15) rotate(5deg); }
        }

        /* 操作パネル */
        #control-panel {
            width: 100%; background: rgba(255, 255, 255, 0.95);
            padding: 15px 0; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10;
        }
        .btn-row { display: flex; gap: 10px; width: 90%; justify-content: center; }
        
        button, select {
            padding: 10px 16px; font-size: 1rem; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15); transition: background 0.2s;
        }
        button { background: #ff9800; color: white; }
        button:hover { background: #f57c00; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        select { background: #e0f2f1; color: #00796b; }
        
        .btn-green { background: #4caf50; }
        .btn-green:hover { background: #388e3c; }
        .btn-blue { background: #2196f3; }
        .btn-blue:hover { background: #1976d2; }
        .btn-red { background: #e53935; }
        .btn-red:hover { background: #c62828; }

        /* モーダル */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 1000;
            justify-content: center; align-items: center; flex-direction: column;
        }

        .modal-content {
            background: white; padding: 20px; border-radius: 12px; width: 80%; max-width: 360px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .rank-list { margin: 15px 0; text-align: left; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid #eee; }
        .my-rank { background: #fff9c4; font-weight: bold; }

        /* 絵日記用紙 */
        .diary-paper {
            width: 90%; max-width: 360px; background: #fffbf0;
            border-radius: 16px; padding: 16px; box-sizing: border-box;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 2px solid #d7ccc8;
            display: flex; flex-direction: column; gap: 12px;
        }
        .diary-img-area {
            width: 100%; background: #fafafa; border-radius: 10px;
            padding: 8px; box-sizing: border-box; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .diary-img {
            max-width: 100%; height: 180px; object-fit: contain;
            border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .img-caption { font-size: 0.8rem; font-weight: bold; color: #795548; text-align: center; margin-top: 6px; }
        
        .diary-text-area {
            width: 100%; height: 180px; display: flex; flex-direction: column; align-items: flex-start;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30"><line x1="0" y1="0" x2="0" y2="30" stroke="%23e0d0c0" stroke-width="1" stroke-dasharray="2,2"/></svg>');
            padding: 8px; box-sizing: border-box; border-radius: 8px; border: 1px solid #efebe9;
        }
        .diary-title {
            font-size: 1.1rem; font-weight: bold; color: #5d4037;
            border-bottom: 2px dashed #bcaaa4; width: 100%; padding-bottom: 4px; margin-bottom: 8px;
        }
        .diary-text {
            writing-mode: vertical-rl;
            -webkit-writing-mode: vertical-rl;
            font-size: 1.05rem; line-height: 1.8; color: #3e2723;
            height: 100%; width: 100%;
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
            padding-bottom: 4px;
        }
        .diary-footer { width: 100%; text-align: right; font-size: 0.8rem; color: #8d6e63; font-weight: bold; }
        .diary-controls { display: flex; gap: 15px; margin-top: 15px; }

        .page-animate { animation: cardSwitch 0.25s ease-out; }
        @keyframes cardSwitch {
            0% { opacity: 0.5; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="fade-overlay"></div>

        <!-- ステータス表示 -->
        <div id="status-bar">
            <div class="text-large">現在の場所: <span id="current-location-text">鹿児島</span></div>
            <div id="score-text" class="text-large">0 もち</div>
            <div id="mps-display">自動増加: 0 もち/秒</div>
            <div id="distance-text" style="font-weight: bold; color: #00796b; margin-top: 4px;">次のエリアまで: 500 もちkcal</div>
            
            <!-- もちメーター -->
            <div id="progress-container">
                <div id="progress-bar"></div>
                <img id="progress-icon" src="mochi_particle.png" alt="もちすけ現在地">
            </div>
        </div>

        <!-- もちすけエリア -->
        <div id="mochisuke-area">
            <div id="combo-display">🔥 0 Combo!</div>
            <div id="mochisuke-wrapper">
                <div id="mochi-balloon">おーい！</div>
                <img id="mochisuke-btn" class="breathe-idle" src="image_0.png" alt="もちすけ" draggable="false">
            </div>
        </div>

        <!-- 操作パネル -->
        <div id="control-panel">
            <div class="btn-row">
                <select id="location-selector" onchange="changeLocation(this.value)">
                    <option value="0">鹿児島</option>
                </select>
                <button id="buy-item-btn" onclick="buyLocalItem()">ご当地アイテム購入</button>
            </div>
            <div class="btn-row">
                <button class="btn-green" id="diary-open-btn" onclick="openDiary()">📖 絵日記をよむ</button>
                <button class="btn-blue" onclick="openRanking()">🏆 ランキング</button>
            </div>
        </div>
    </div>

    <!-- ランキングモーダル -->
    <div id="ranking-modal" class="modal">
        <div class="modal-content">
            <h2>🏆 もちもちランキング</h2>
            <div id="ranking-list" class="rank-list"></div>
            <button class="btn-red" onclick="closeRanking()">閉じる</button>
        </div>
    </div>

    <!-- 絵日記モーダル -->
    <div id="diary-modal" class="modal">
        <div class="diary-paper" id="diary-paper-element">
            <div class="diary-img-area">
                <img class="diary-img" id="diary-img-element" src="" alt="絵日記の画像">
                <div class="img-caption" id="diary-img-caption">思い出の写真</div>
            </div>
            <div class="diary-text-area">
                <div class="diary-title" id="diary-title-element">鹿児島編</div>
                <div class="diary-text" id="diary-text-element"></div>
            </div>
            <div class="diary-footer" id="diary-footer-element">ページ: 1</div>
        </div>
        <div class="diary-controls">
            <button id="prev-page-btn" onclick="prevPage()">◀ もどる</button>
            <button id="next-page-btn" onclick="nextPage()">つぎへ ▶</button>
            <button class="btn-red" onclick="closeDiary()">閉じる</button>
        </div>
    </div>

    <script>
        const stages = [
            { name: "鹿児島", distance: 500, item: "白熊アイス", price: 50, diary: "旅の始まりは鹿児島から！\n桜島がとっても雄大で、パワーをもらった気分だぞ。\nここから日本中をもちでいっぱいにしに行くぞ！", bg: "bg_images/kagoshima.png", diaryImg: "diary_images/kagoshima_d.png", effectDesc: "タップ力 +1", tapBonus: 1, mpsBonus: 0 },
            { name: "宮崎", distance: 1500, item: "完熟マンゴー", price: 300, diary: "宮崎にやってきたぞ！\nヤシの木がたくさん並んでいて、南国気分満点だぁ。\nお日様をいっぱい浴びたマンゴーは甘くて最高！", bg: "bg_images/miyazaki.png", diaryImg: "diary_images/miyazaki_d.png", effectDesc: "自動増加 +1もち/秒", tapBonus: 0, mpsBonus: 1 },
            { name: "大分", distance: 4000, item: "かぼすソフト", price: 1000, diary: "大分といえばやっぱり温泉！\n至る所から湯気がもくもく立ち上っていてびっくり。\n足湯に入ったら、旅の疲れが一気に吹き飛んだや。\nかぼすソフトはすっぱくて元気になるぞ！", bg: "bg_images/oita.png", diaryImg: "diary_images/oita_d.png", effectDesc: "タップ力 +4", tapBonus: 4, mpsBonus: 0 },
            { name: "熊本", distance: 12000, item: "からし蓮根", price: 3500, diary: "熊本城を見に行ったぞ！\n石垣がすごく高くて圧倒されちゃった。\nからし蓮根を食べたら、ツーンときて涙が出ちゃったの。大人の味だね！", bg: "bg_images/kumamoto.png", diaryImg: "diary_images/kumamoto_d.png", effectDesc: "自動増加 +8もち/秒", tapBonus: 0, mpsBonus: 8 },
            { name: "長崎", distance: 30000, item: "長崎カステラ", price: 10000, diary: "長崎は坂の街！のぼり坂がいっぱいでいい運動になったよ。\n夜に見る異国情緒あふれる街並みがすごく綺麗だったなぁ。\nカステラもザラメがシャリシャリで美味しかった！", bg: "bg_images/nagasaki.png", diaryImg: "diary_images/nagasaki_d.png", effectDesc: "タップ力 +15", tapBonus: 15, mpsBonus: 0 },
            { name: "佐賀", distance: 75000, item: "呼子のイカ", price: 25000, diary: "佐賀の呼子で透明なイカを食べたぞ！\nコリコリしていて甘くて、今まで食べたイカと全然違うの。\n吉野ヶ里遺跡で昔の人の暮らしに思いを馳せた一日でした。", bg: "bg_images/saga.png", diaryImg: "diary_images/saga_d.png", effectDesc: "自動増加 +30もち/秒", tapBonus: 0, mpsBonus: 30 },
            { name: "福岡", distance: 150000, item: "博多ラーメン", price: 60000, diary: "ついに九州のゴール、福岡へ！\n中洲の屋台街はとっても賑やかでワクワクしたぞ。\n美味しいとんこつラーメンをバッチリ替玉まで完食！\nさぁ、九州制覇だ！次は本州へ進撃だ！", bg: "bg_images/fukuoka.png", diaryImg: "diary_images/fukuoka_d.png", effectDesc: "タップ力 +50", tapBonus: 50, mpsBonus: 0 }
        ];

        let score = 0; 
        let currentStageIndex = 0;     
        let selectedStageIndex = 0;    
        let currentStageProgress = 0;   
        let purchasedItems = {};       

        let isFever = false;
        let feverTimeLeft = 0;
        let feverInterval = null;

        let comboCount = 0;
        let comboTimer = null;

        let bgmAudio = null;
        let isBgmInitialized = false;

        // サウンドプール
        const MAX_TAP_SOUNDS = 5;
        const tapSoundPool = [];
        let tapSoundIndex = 0;
        for (let i = 0; i < MAX_TAP_SOUNDS; i++) {
            tapSoundPool.push(new Audio('tap.mp3'));
        }

        let lastTappedTime = Date.now();
        const callPhrases = ["もちもち？", "おーい！", "画面を叩くのじゃ", "旅を続けるぞ！", "寝てしまうぞ…"];

        function initAndPlayBGM() {
            if (isBgmInitialized) return;
            isBgmInitialized = true;
            bgmAudio = new Audio('bgm.mp3');
            bgmAudio.loop = true;
            bgmAudio.volume = 0.3;
            bgmAudio.play().catch(e => {
                console.log("BGM再生制限中", e);
                isBgmInitialized = false;
            });
        }

        window.onload = function() {
            updateDisplay();
            buildLocationSelector();
            startFeverSpawningLoop();
            startCatSpawningLoop();
            startMochiLifeLoop();
        };

        function getTapPower() {
            let power = 1; 
            stages.forEach((stage, idx) => {
                if (purchasedItems[idx]) power += stage.tapBonus;
            });
            if (comboCount >= 10) power += Math.floor(comboCount / 10);
            if (isFever) power *= 5;
            return power;
        }

        function getMps() {
            let mps = 0; 
            stages.forEach((stage, idx) => {
                if (purchasedItems[idx]) mps += stage.mpsBonus;
            });
            return mps;
        }

        function playTapSound() {
            const audio = tapSoundPool[tapSoundIndex];
            audio.volume = 0.6;
            audio.currentTime = 0;
            audio.play().catch(e => console.log("SE制限中"));
            tapSoundIndex = (tapSoundIndex + 1) % MAX_TAP_SOUNDS;
        }

        function triggerAreaTransition(newBgUrl, callback) {
            const overlay = document.getElementById('fade-overlay');
            const moveAudio = new Audio('move.mp3');
            moveAudio.volume = 0.6;
            moveAudio.play().catch(e => console.log("移動音制限中"));
            overlay.classList.add('fade-black');
            setTimeout(() => {
                callback();
                document.getElementById('game-screen').style.background = `url('${newBgUrl}') center/cover no-repeat`;
                setTimeout(() => overlay.classList.remove('fade-black'), 150);
            }, 300);
        }

        function createRippleEffect(x, y) {
            const gameScreen = document.getElementById('game-screen');
            const rect = gameScreen.getBoundingClientRect();
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = (x - rect.left) + 'px';
            ripple.style.top = (y - rect.top) + 'px';
            gameScreen.appendChild(ripple);
            setTimeout(() => ripple.remove(), 400);
        }

        function createFloatingText(x, y, amount) {
            const gameScreen = document.getElementById('game-screen');
            const rect = gameScreen.getBoundingClientRect();
            const div = document.createElement('div');
            div.className = 'floating-text';
            div.innerText = `+${amount} もち`;
            div.style.left = (x - rect.left) + 'px';
            div.style.top = (y - rect.top) + 'px';
            gameScreen.appendChild(div);
            setTimeout(() => div.remove(), 600);
        }

        // 🎯 物理演算方式（requestAnimationFrame）に完全刷新！
        function createParticle(x, y) {
            if (document.querySelectorAll('.particle').length > 60) return;

            const gameScreen = document.getElementById('game-screen');
            const rect = gameScreen.getBoundingClientRect();
            const p = document.createElement('div');
            p.className = 'particle';
            
            // タップされた瞬間の絶対座標をセット
            p.style.left = (x - rect.left) + 'px';
            p.style.top = (y - rect.top) + 'px';

            // 🚀 初速の設定（斜め横への勢い、上への跳ね上がり）
            let vx = (Math.random() - 0.5) * 14;  // 横方向のランダムな広がり
            let vy = -(Math.random() * 6 + 11);   // 上方向への力強い飛び出し

            // 🌍 重力加速度（この数値が絶妙な「ふわっと感」を作ります）
            const gravity = 0.35; 

            // 累積移動量
            let curX = 0;
            let curY = 0;

            gameScreen.appendChild(p);

            // 毎フレーム呼び出される物理シミュレーションループ
            function updatePhys() {
                curX += vx;
                curY += vy;
                vy += gravity; // 毎フレーム、重力によって下向きに加速

                // 中心点を維持しつつ、物理計算した移動量をリアルタイム反映
                p.style.transform = `translate(calc(-50% + ${curX}px), calc(-50% + ${curY}px))`;

                // 画面外（底辺）を突き抜けたら要素を削除してメモリ解放
                if (curY > rect.height) {
                    p.remove();
                } else {
                    requestAnimationFrame(updatePhys);
                }
            }
            // ループ開始
            requestAnimationFrame(updatePhys);
        }

        function handleCombo() {
            comboCount++;
            const comboEl = document.getElementById('combo-display');
            comboEl.innerText = `🔥 ${comboCount} Combo!`;
            comboEl.classList.remove('combo-bounce');
            void comboEl.offsetWidth;
            comboEl.classList.add('combo-bounce');
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                comboCount = 0;
                comboEl.classList.remove('combo-bounce');
            }, 1200);
        }

        // タップイベント
        document.getElementById('mochisuke-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            initAndPlayBGM();
            playTapSound();
            handleCombo();
            
            lastTappedTime = Date.now();
            document.getElementById('mochi-balloon').classList.remove('balloon-show');
            
            const mochiBtn = document.getElementById('mochisuke-btn');
            mochiBtn.classList.remove('breathe-idle', 'hekomi-anim');
            void mochiBtn.offsetWidth;
            mochiBtn.classList.add('hekomi-anim');

            createRippleEffect(e.clientX, e.clientY);
            createFloatingText(e.clientX, e.clientY, getTapPower());
            createParticle(e.clientX, e.clientY);

            if (selectedStageIndex === currentStageIndex && currentStageIndex < stages.length) {
                score += getTapPower();
                currentStageProgress += getTapPower();
                checkStageProgress();
            } else {
                score += getTapPower(); 
            }
            updateDisplay();
        });

        document.getElementById('mochisuke-btn').addEventListener('animationend', (e) => {
            if (e.animationName === 'hekomi') {
                const mochiBtn = document.getElementById('mochisuke-btn');
                mochiBtn.classList.remove('hekomi-anim');
                mochiBtn.classList.add('breathe-idle');
            }
        });

        document.body.addEventListener('pointerdown', () => initAndPlayBGM(), { once: true });

        function startMochiLifeLoop() {
            setInterval(() => {
                const idleDuration = Date.now() - lastTappedTime;
                const balloon = document.getElementById('mochi-balloon');
                if (idleDuration > 5000 && !isFever) {
                    if (!balloon.classList.contains('balloon-show')) {
                        const randomText = callPhrases[Math.floor(Math.random() * callPhrases.length)];
                        balloon.innerText = randomText;
                        balloon.classList.add('balloon-show');
                    }
                }
            }, 2000);
        }

        function startCatSpawningLoop() {
            setInterval(() => {
                if (document.getElementById('lucky-cat')) return;
                if (Math.random() < 0.4) spawnLuckyCat();
            }, 20000);
        }

        function spawnLuckyCat() {
            const gameScreen = document.getElementById('game-screen');
            const cat = document.createElement('div');
            cat.id = 'lucky-cat';
            cat.innerHTML = '🐱<br><span style="font-size:11px; background:rgba(255,255,255,0.85); color:#d32f2f; border-radius:4px; padding:1px 4px; font-weight:bold; border:1px solid #d32f2f;">福!!</span>';
            cat.style.position = 'absolute'; cat.style.fontSize = '42px'; cat.style.cursor = 'pointer'; cat.style.zIndex = '95'; cat.style.textAlign = 'center'; cat.style.transition = 'transform 3.5s linear';
            
            const rect = gameScreen.getBoundingClientRect();
            cat.style.left = '-70px'; cat.style.top = (Math.random() * (rect.height - 320) + 160) + 'px';
            gameScreen.appendChild(cat);
            
            setTimeout(() => cat.style.transform = `translateX(${rect.width + 140}px) rotate(360deg)`, 50);
            
            cat.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                const bonus = Math.max(200, Math.floor(getMps() * 60));
                score += bonus;
                createParticle(e.clientX, e.clientY);
                alert(`🐱 ラッキーキャットを捕まえた！\n【福もちボーナス +${bonus.toLocaleString()} もち】獲得！`);
                cat.remove();
                updateDisplay();
            });
            setTimeout(() => { if (cat.parentNode) cat.remove(); }, 3500);
        }

        function startFeverSpawningLoop() {
            setInterval(() => {
                if (isFever || document.getElementById('fever-pop')) return;
                if (Math.random() < 0.5) spawnGoldMochi();
            }, 15000);
        }

        function spawnGoldMochi() {
            const area = document.getElementById('mochisuke-area');
            const goldMochi = document.createElement('div');
            goldMochi.id = 'fever-pop'; goldMochi.innerText = "✨金✨";
            const rect = area.getBoundingClientRect();
            goldMochi.style.left = (Math.random() * (rect.width - 80) + 40) + 'px';
            goldMochi.style.top = (Math.random() * (rect.height - 80) + 40) + 'px';

            goldMochi.addEventListener('pointerdown', (e) => {
                e.stopPropagation(); goldMochi.remove(); triggerFeverTime();
            });
            area.appendChild(goldMochi);
            setTimeout(() => { if (document.getElementById('fever-pop') === goldMochi) goldMochi.remove(); }, 6000);
        }

        function triggerFeverTime() {
            isFever = true; feverTimeLeft = 10;
            document.getElementById('mochi-balloon').classList.remove('balloon-show');
            document.getElementById('status-bar').classList.add('fever-active');
            updateDisplay();

            if (feverInterval) clearInterval(feverInterval);
            feverInterval = setInterval(() => {
                feverTimeLeft--;
                if (feverTimeLeft <= 0) {
                    clearInterval(feverInterval); isFever = false;
                    document.getElementById('status-bar').classList.remove('fever-active');
                }
                updateDisplay();
            }, 1000);
        }

        function checkStageProgress() {
            if (currentStageProgress >= stages[currentStageIndex].distance) {
                if (currentStageIndex < stages.length - 1) {
                    currentStageIndex++;
                    const nextIdx = currentStageIndex;
                    currentStageProgress = 0;
                    
                    triggerAreaTransition(stages[nextIdx].bg, () => {
                        selectedStageIndex = nextIdx;
                        alert(`新エリア「${stages[nextIdx].name}」に到達しました！`);
                        buildLocationSelector();
                        updateDisplay();
                    });
                } else {
                    currentStageProgress = stages[currentStageIndex].distance;
                }
            }
        }

        function updateDisplay() {
            if (isFever) {
                document.getElementById('score-text').innerHTML = `🔥 5倍フィーバー中！ (${feverTimeLeft}秒) 🔥<br>${Math.floor(score).toLocaleString()} もち`;
            } else {
                document.getElementById('score-text').innerText = Math.floor(score).toLocaleString() + " もち";
            }

            document.getElementById('current-location-text').innerText = stages[selectedStageIndex].name;
            document.getElementById('mps-display').innerText = `自動増加: ${getMps()} もち/秒 (現在タップ力: +${getTapPower()})`;

            const buyBtn = document.getElementById('buy-item-btn');
            const activeStage = stages[selectedStageIndex];

            if (purchasedItems[selectedStageIndex]) {
                buyBtn.innerText = `購入済: ${activeStage.item} (${activeStage.effectDesc})`;
                buyBtn.disabled = true;
            } else {
                buyBtn.innerText = `${activeStage.item}を買う (${activeStage.price}もち)\n【効果: ${activeStage.effectDesc}】`;
                buyBtn.disabled = score < activeStage.price;
            }

            const distText = document.getElementById('distance-text');
            const progressBar = document.getElementById('progress-bar');
            const progressIcon = document.getElementById('progress-icon');

            if (selectedStageIndex < currentStageIndex) {
                distText.innerText = "このエリアは踏破済みです";
                progressBar.style.width = "100%";
                progressIcon.style.left = "100%";
            } else if (currentStageIndex === stages.length - 1 && currentStageProgress >= stages[currentStageIndex].distance) {
                distText.innerText = "🎉 祝・九州制覇完了！！";
                progressBar.style.width = "100%";
                progressIcon.style.left = "100%";
            } else {
                const remaining = Math.ceil(stages[currentStageIndex].distance - currentStageProgress);
                distText.innerText = `次のエリアまで: ${remaining} もちkcal`;
                
                let pct = (currentStageProgress / stages[currentStageIndex].distance) * 100;
                if (pct > 100) pct = 100;
                if (pct < 0) pct = 0;
                progressBar.style.width = pct + "%";
                progressIcon.style.left = pct + "%";
            }
        }

        function buildLocationSelector() {
            const selector = document.getElementById('location-selector');
            selector.innerHTML = "";
            for (let i = 0; i <= currentStageIndex; i++) {
                if (i < stages.length) {
                    const opt = document.createElement('option'); opt.value = i; opt.text = stages[i].name;
                    if (i === selectedStageIndex) opt.selected = true;
                    selector.appendChild(opt);
                }
            }
        }

        function changeLocation(index) {
            const idx = parseInt(index);
            triggerAreaTransition(stages[idx].bg, () => { selectedStageIndex = idx; updateDisplay(); });
        }

        function buyLocalItem() {
            const activeStage = stages[selectedStageIndex];
            if (score >= activeStage.price && !purchasedItems[selectedStageIndex]) {
                score -= activeStage.price; purchasedItems[selectedStageIndex] = true;
                alert(`「${activeStage.item}」を購入しました！\n特殊効果【${activeStage.effectDesc}】が発動しました！`);
                updateDisplay();
            }
        }

        function openRanking() {
            let listContainer = document.getElementById('ranking-list');
            let dummyRanks = [
                { name: "九州もち王", score: 250000, isMe: false },
                { name: "タイパーすけ", score: 45000, isMe: false },
                { name: "あなた (もちすけ)", score: Math.floor(score), isMe: true },
                { name: "見習いもち", score: 10, isMe: false }
            ];
            dummyRanks.sort((a, b) => b.score - a.score);
            listContainer.innerHTML = "";
            dummyRanks.forEach((player, index) => {
                let item = document.createElement('div');
                item.className = player.isMe ? "rank-item my-rank" : "rank-item";
                item.innerHTML = `<span>${index + 1}位. ${player.name}</span><span>${player.score.toLocaleString()} もち</span>`;
                listContainer.appendChild(item);
            });
            document.getElementById('ranking-modal').style.display = "flex";
        }
        function closeRanking() { document.getElementById('ranking-modal').style.display = "none"; }

        setInterval(() => {
            let mps = getMps();
            if (mps > 0) {
                let gain = mps / 10; score += gain;
                if (selectedStageIndex === currentStageIndex && currentStageIndex < stages.length) {
                    currentStageProgress += gain; checkStageProgress();
                }
                updateDisplay();
            }
        }, 100);

        let diaryPageIndex = 0;
        function openDiary() { diaryPageIndex = selectedStageIndex; renderDiaryPage(); document.getElementById('diary-modal').style.display = "flex"; }
        function closeDiary() { document.getElementById('diary-modal').style.display = "none"; }

        function renderDiaryPage() {
            const stage = stages[diaryPageIndex];
            const paper = document.getElementById('diary-paper-element');
            
            paper.classList.remove('page-animate'); void paper.offsetWidth; paper.classList.add('page-animate');

            const hasItemText = purchasedItems[diaryPageIndex] ? `🛍️ アイテム: ${stage.item} (有効)` : "🛍️ アイテム: 未購入";
            document.getElementById('diary-img-element').src = stage.diaryImg; 
            document.getElementById('diary-img-caption').innerText = `【${stage.name}の思い出】 ・ ${hasItemText}`;
            document.getElementById('diary-title-element').innerText = `${stage.name}編`;
            document.getElementById('diary-text-element').innerText = stage.diary;
            document.getElementById('diary-footer-element').innerText = `枚数: ${diaryPageIndex + 1} / ${currentStageIndex + 1}`;

            document.getElementById('prev-page-btn').disabled = (diaryPageIndex === 0);
            document.getElementById('next-page-btn').disabled = (diaryPageIndex === currentStageIndex || diaryPageIndex === stages.length - 1);
        }
        function nextPage() { if (diaryPageIndex < currentStageIndex && diaryPageIndex < stages.length - 1) { diaryPageIndex++; renderDiaryPage(); } }
        function prevPage() { if (diaryPageIndex > 0) { diaryPageIndex--; renderDiaryPage(); } }
    </script>
</body>
</html>
