<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BTBF44E0WD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BTBF44E0WD');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>もちすけ日本縦断クリッカー</title>
    <style>
        /* 全体スタイル */
        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
            background-color: #f5f5f5;
            touch-action: manipulation; /* タップズーム防止 */
        }

        #game-screen {
            width: 100%; max-width: 480px; height: 100vh;
            position: relative; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background: url('tokyo_bg.png') center/cover no-repeat;
        }

        /* ステータスバー */
        #status-bar {
            width: 90%; background: rgba(255, 255, 255, 0.9);
            padding: 10px; margin-top: 15px; border-radius: 12px;
            text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .text-large { font-size: 1.2rem; font-weight: bold; color: #333; margin: 2px 0; }

        /* キャラクターエリア */
        #mochisuke-area {
            flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%;
        }
        #mochisuke-btn {
            width: 220px; height: 220px; cursor: pointer;
            transition: transform 0.05s ease;
            z-index: 5;
        }
        #mochisuke-btn:active { transform: scale(0.95); }

        /* 🔥 パーティクル（エフェクト）のCSS */
        .particle {
            position: fixed; color: #ff9800; font-size: 24px; font-weight: bold;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 100;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) translateY(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) translateY(-80px); opacity: 0; }
        }

        /* 操作パネル */
        #control-panel {
            width: 100%; background: rgba(255, 255, 255, 0.95);
            padding: 15px 0; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 10;
        }
        .btn-row { display: flex; gap: 10px; width: 90%; justify-content: center; }
        
        button, select {
            padding: 10px 16px; font-size: 1rem; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15); transition: background 0.2s;
        }
        button { background: #ff9800; color: white; }
        button:hover { background: #f57c00; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        select { background: #e0f2f1; color: #00796b; }
        
        .btn-green { background: #4caf50; }
        .btn-green:hover { background: #388e3c; }
        .btn-blue { background: #2196f3; }
        .btn-blue:hover { background: #1976d2; }
        .btn-red { background: #e53935; }
        .btn-red:hover { background: #c62828; }

        /* モーダル共通設定 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 1000;
            justify-content: center; align-items: center; flex-direction: column;
        }

        /* ランキングモーダルのスタイル */
        .modal-content {
            background: white; padding: 20px; border-radius: 12px; width: 80%; max-width: 360px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .rank-list { margin: 15px 0; text-align: left; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid #eee; }
        .my-rank { background: #fff9c4; font-weight: bold; }

        /* 📖 両開き（見開き）絵日記本のスタイル */
        .book-container {
            width: 95%; max-width: 680px; height: 460px;
            perspective: 1200px; display: flex; flex-direction: column; align-items: center;
        }
        .book {
            width: 100%; height: 100%; display: flex;
            background: #e0d0b0; border-radius: 8px; padding: 10px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4); position: relative;
        }
        /* 本の中央の折り目線 */
        .book::after {
            content: ''; position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.3), rgba(0,0,0,0), rgba(0,0,0,0.3));
            transform: translateX(-50%); z-index: 20;
        }
        .page-left, .page-right {
            width: 50%; height: 100%; background: #fffbf0;
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;
            position: relative; z-index: 10; overflow: hidden;
        }
        .page-left {
            border-radius: 6px 0 0 6px; border-right: 1px solid rgba(0,0,0,0.1);
            justify-content: center; align-items: center;
        }
        .page-right {
            border-radius: 0 6px 6px 0; border-left: 1px solid rgba(0,0,0,0.1);
            justify-content: flex-start;
        }
        .diary-img {
            max-width: 100%; max-height: 85%; object-fit: contain;
            border: 4px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2); background: #eee;
        }
        .img-caption { margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #5d4037; text-align: center; }
        
        .diary-title { font-size: 1.3rem; font-weight: bold; color: #5d4037; border-bottom: 2px dashed #bcaaa4; padding-bottom: 5px; }
        .diary-text { font-size: 1rem; line-height: 1.6; color: #4e342e; flex: 1; margin-top: 15px; white-space: pre-wrap; overflow-y: auto; }
        .diary-footer { text-align: right; font-size: 0.85rem; color: #8d6e63; font-weight: bold; margin-top: 5px; }

        .diary-controls { display: flex; gap: 15px; margin-top: 20px; }
        
        /* ページめくり時の簡易演出用 */
        .page-animate { animation: pageFlipEffect 0.3s ease-in-out; }
        @keyframes pageFlipEffect {
            0% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="status-bar">
            <div class="text-large">現在の場所: <span id="current-location-text">東京</span></div>
            <div id="score-text" class="text-large">0 もち</div>
            <div id="distance-text" style="font-weight: bold; color: #00796b;">次のエリアまで: 100 もちkcal</div>
        </div>

        <div id="mochisuke-area">
            <img id="mochisuke-btn" src="image_0.png" alt="もちすけ" draggable="false">
        </div>

        <div id="control-panel">
            <div class="btn-row">
                <select id="location-selector" onchange="changeLocation(this.value)">
                    <option value="0">東京</option>
                </select>
                <button id="buy-item-btn" onclick="buyLocalItem()">ご当地アイテム購入</button>
            </div>
            <div class="btn-row">
                <button class="btn-green" id="diary-open-btn" onclick="openDiary()">📖 絵日記をよむ</button>
                <button class="btn-blue" onclick="openRanking()">🏆 ランキング</button>
            </div>
        </div>
    </div>

    <div id="ranking-modal" class="modal">
        <div class="modal-content">
            <h2>🏆 もちもちランキング</h2>
            <div id="ranking-list" class="rank-list"></div>
            <button class="btn-red" onclick="closeRanking()">閉じる</button>
        </div>
    </div>

    <div id="diary-modal" class="modal">
        <div class="book-container">
            <div class="book" id="diary-book">
                <div class="page-left" id="diary-left-page">
                    <img class="diary-img" id="diary-img-element" src="image_0.png" alt="絵日記の画像">
                    <div class="img-caption" id="diary-img-caption">思い出の写真</div>
                </div>
                <div class="page-right" id="diary-right-page">
                    <div class="diary-title" id="diary-title-element">東京編</div>
                    <div class="diary-text" id="diary-text-element">日記の文章</div>
                    <div class="diary-footer" id="diary-footer-element">ページ: 1</div>
                </div>
            </div>
        </div>
        <div class="diary-controls">
            <button id="prev-page-btn" onclick="prevPage()">◀ もどる</button>
            <button id="next-page-btn" onclick="nextPage()">つぎへ ▶</button>
            <button class="btn-red" onclick="closeDiary()">閉じる</button>
        </div>
    </div>

    <script>
        // --- ステージ・絵日記データ ---
        const stages = [
            { name: "東京", distance: 100, item: "東京バナナ", price: 50, diary: "今日から日本縦断の旅が始まったぞ！\nまずは大都会東京を出発。\nこれからどんな出会いがあるかワクワクするなぁ。\nたくさん歩くぞー！", img: "tokyo_bg.png" },
            { name: "静岡", distance: 150, item: "うなぎパイ", price: 150, diary: "静岡に到着！\n右を見ても左を見てもお茶畑が広がっていて、空気がとっても美味しいや。\n富士山がすっごく綺麗に見えたんだ！", img: "image_0.png" },
            { name: "名古屋", distance: 200, item: "天むす", price: 400, diary: "名古屋といえば金のシャチホコ！\nお城がとっても立派だったなぁ。\n夜はエビフライと手羽先を食べてお腹いっぱい。\n大満足の一日！", img: "image_0.png" },
            { name: "京都", distance: 180, item: "生八ツ橋", price: 800, diary: "京都の古い街並みをのんびりお散歩したよ。\nお寺がたくさんあって静かで落ち着く場所だなぁ。\n抹茶のスイーツがとっても美味しかった！", img: "image_0.png" },
            { name: "大阪", distance: 100, item: "たこ焼き", price: 1500, diary: "ついに大阪にやってきたで！\n街の看板がどれもド派手でびっくりしちゃった。\n本場のたこ焼きは外がカリカリ、中がトロトロで最高！", img: "image_0.png" }
        ];

        // --- セーブデータ用変数 ---
        let score = 0; // もちの数
        let currentStageIndex = 0;     // ストーリー上の現在攻略ステージ
        let selectedStageIndex = 0;    // プレイヤーが今滞在しているステージ
        let currentStageProgress = 0;   // 現在ステージの進行状況
        let purchasedItems = {};       // 購入済みアイテム { ステージID: true }

        // --- オーディオ制限解除 (元コードの仕組み) ---
        let audioUnlocked = false;
        function unlockAudio() {
            if (audioUnlocked) return;
            const buffer = new AudioContext().createBuffer(1, 1, 22050);
            audioUnlocked = true;
            document.body.removeEventListener('touchstart', unlockAudio);
            document.body.removeEventListener('click', unlockAudio);
        }
        document.body.addEventListener('touchstart', unlockAudio, { passive: true });
        document.body.addEventListener('click', unlockAudio, { passive: true });

        window.onload = function() {
            updateDisplay();
            buildLocationSelector();
        };

        // --- 1. 重複タップ音再生機能 ---
        function playTapSound() {
            const audio = new Audio('tap.mp3');
            audio.volume = 0.6;
            audio.play().catch(e => console.log("オーディオ再生制限中"));
        }

        // --- 2. パーティクル（エフェクト）生成機能 ---
        function createParticle(x, y, text) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = text;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);

            // アニメーションが終わったら自動消去
            p.addEventListener('animationend', () => { p.remove(); });
        }

        // もちすけクリック処理
        document.getElementById('mochisuke-btn').addEventListener('click', (e) => {
            playTapSound();
            
            // タップした位置に「+1 もち」エフェクトを表示！
            createParticle(e.clientX, e.clientY, "+1 もち");

            if (selectedStageIndex === currentStageIndex && currentStageIndex < stages.length) {
                score += 1;
                currentStageProgress += 1;
                checkStageProgress();
            } else {
                score += 1; // 過去エリア滞在時はもちだけ増える
            }

            updateDisplay();
        });

        // ステージ進行管理
        function checkStageProgress() {
            if (currentStageProgress >= stages[currentStageIndex].distance) {
                if (currentStageIndex < stages.length - 1) {
                    currentStageIndex++;
                    selectedStageIndex = currentStageIndex;
                    currentStageProgress = 0;
                    alert(`新エリア「${stages[currentStageIndex].name}」に到達しました！`);
                    buildLocationSelector();
                } else {
                    currentStageProgress = stages[currentStageIndex].distance;
                }
            }
        }

        // 画面表示更新（★ご要望の単位「もち」「もちkcal」を適用）
        function updateDisplay() {
            document.getElementById('score-text').innerText = score.toLocaleString() + " もち";
            document.getElementById('current-location-text').innerText = stages[selectedStageIndex].name;

            const buyBtn = document.getElementById('buy-item-btn');
            const activeStage = stages[selectedStageIndex];

            if (purchasedItems[selectedStageIndex]) {
                buyBtn.innerText = `購入済: ${activeStage.item}`;
                buyBtn.disabled = true;
            } else {
                buyBtn.innerText = `${activeStage.item}を買う (${activeStage.price}もち)`;
                buyBtn.disabled = score < activeStage.price;
            }

            const distText = document.getElementById('distance-text');
            if (selectedStageIndex < currentStageIndex) {
                distText.innerText = "このエリアは踏破済みです";
            } else if (currentStageIndex === stages.length - 1 && currentStageProgress >= stages[currentStageIndex].distance) {
                distText.innerText = "🎉 日本縦断ゴール達成！！";
            } else {
                const remaining = stages[currentStageIndex].distance - currentStageProgress;
                distText.innerText = `次のエリアまで: ${remaining} もちkcal`;
            }
        }

        // エリア選択肢の構築
        function buildLocationSelector() {
            const selector = document.getElementById('location-selector');
            selector.innerHTML = "";
            for (let i = 0; i <= currentStageIndex; i++) {
                if (i < stages.length) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.text = stages[i].name;
                    if (i === selectedStageIndex) opt.selected = true;
                    selector.appendChild(opt);
                }
            }
        }

        function changeLocation(index) {
            selectedStageIndex = parseInt(index);
            updateDisplay();
        }

        function buyLocalItem() {
            const activeStage = stages[selectedStageIndex];
            if (score >= activeStage.price && !purchasedItems[selectedStageIndex]) {
                score -= activeStage.price;
                purchasedItems[selectedStageIndex] = true;
                alert(`「${activeStage.item}」を購入しました！絵日記に記録されます。`);
                updateDisplay();
            }
        }

        // --- 3. 自動増加＆ランキング機能 (元コードから完全復元) ---
        function getMps() {
            return 0; // 元コードのMPS算出ロジック。必要に応じてここに式を戻せます
        }

        function openRanking() {
            let listContainer = document.getElementById('ranking-list');
            let dummyRanks = [
                { name: "もちマスター", score: 999999, isMe: false },
                { name: "ポチポチ神", score: 50000, isMe: false },
                { name: "あなた (もちすけ)", score: Math.floor(score), isMe: true },
                { name: "ビギナーもち", score: 10, isMe: false }
            ];

            dummyRanks.sort((a, b) => b.score - a.score);
            listContainer.innerHTML = "";
            dummyRanks.forEach((player, index) => {
                let item = document.createElement('div');
                item.className = player.isMe ? "rank-item my-rank" : "rank-item";
                item.innerHTML = `<span>${index + 1}位. ${player.name}</span><span>${player.score.toLocaleString()} もち</span>`;
                listContainer.appendChild(item);
            });
            document.getElementById('ranking-modal').style.display = "flex";
        }

        function closeRanking() { document.getElementById('ranking-modal').style.display = "none"; }

        setInterval(() => {
            let mps = getMps();
            if (mps > 0) {
                score += mps;
                checkStageProgress();
                updateDisplay();
            }
        }, 1000);

        // --- 4. 📖 新・両開き絵日記システム ---
        let diaryPageIndex = 0;

        function openDiary() {
            diaryPageIndex = selectedStageIndex; // いま滞在している場所の日記を自動で開く
            renderDiaryPage();
            document.getElementById('diary-modal').style.display = "flex";
        }

        function closeDiary() { document.getElementById('diary-modal').style.display = "none"; }

        function renderDiaryPage() {
            const stage = stages[diaryPageIndex];
            const book = document.getElementById('diary-book');
            
            // めくりアニメーションのリセットと実行
            book.classList.remove('page-animate');
            void book.offsetWidth; 
            book.classList.add('page-animate');

            // 📸 左ページ：絵（写真）とご当地アイテム状態の表示
            const hasItemText = purchasedItems[diaryPageIndex] ? `🛍️ ご当地アイテム: ${stage.item}` : "🛍️ ご当地アイテム: 未購入";
            document.getElementById('diary-img-element').src = stage.img; // 各都道府県の画像をセット
            document.getElementById('diary-img-caption').innerText = `【${stage.name}の思い出】\n${hasItemText}`;

            // ✍️ 右ページ：日記の文章
            document.getElementById('diary-title-element').innerText = `${stage.name}編`;
            document.getElementById('diary-text-element').innerText = stage.diary;
            document.getElementById('diary-footer-element').innerText = `ページ: ${diaryPageIndex + 1} / ${currentStageIndex + 1}`;

            // ボタン制御（プレイヤーが到達したところまでしか進めない仕様）
            document.getElementById('prev-page-btn').disabled = (diaryPageIndex === 0);
            document.getElementById('next-page-btn').disabled = (diaryPageIndex === currentStageIndex || diaryPageIndex === stages.length - 1);
        }

        function nextPage() {
            if (diaryPageIndex < currentStageIndex && diaryPageIndex < stages.length - 1) {
                diaryPageIndex++;
                renderDiaryPage();
            }
        }

        function prevPage() {
            if (diaryPageIndex > 0) {
                diaryPageIndex--;
                renderDiaryPage();
            }
        }
    </script>
</body>
</html>
