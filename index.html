<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BTBF44E0WD"></script>
    <script>

      function gtag(){dataLayer.push(arguments);}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>もちすけ日本縦断クリッカー</title>
    <style>
        /* 全体スタイル */
        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none;
            background-color: #f5f5f5;
            touch-action: manipulation;
        }

        #game-screen {
            width: 100%; max-width: 480px; height: 100vh;
            position: relative; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background: url('tokyo_bg.png') center/cover no-repeat;
        }

        /* 🎬 エリア移動用暗転オーバーレイ */
        #fade-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; opacity: 0; pointer-events: none; z-index: 9999;
            transition: opacity 0.3s ease;
        }
        .fade-black { opacity: 1 !important; }

        /* ステータスバー */
        #status-bar {
            width: 90%; background: rgba(255, 255, 255, 0.9);
            padding: 10px; margin-top: 15px; border-radius: 12px;
            text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.3s ease;
        }
        .text-large { font-size: 1.2rem; font-weight: bold; color: #333; margin: 2px 0; }
        #mps-display { font-size: 0.9rem; color: #666; font-weight: bold; }

        /* フィーバー中のステータスバー演出 */
        .fever-active {
            background: linear-gradient(135deg, #fff176, #ffb74d) !important;
            box-shadow: 0 0 20px #ff9800 !important;
            animation: feverPulse 1s infinite alternate;
        }
        @keyframes feverPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        /* キャラクターエリア */
        #mochisuke-area {
            flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%;
        }
        
        #mochisuke-btn {
            width: 220px;
            height: auto;
            max-height: 250px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.05s ease;
            z-index: 5;
        }
        #mochisuke-btn:active { transform: scale(0.93); } /* わずかに縮む弾力感 */

        /* 🔥 コンボ数表示用のUI */
        #combo-display {
            position: absolute; top: 20px; font-size: 1.5rem; font-weight: 900;
            color: #ff3d00; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff;
            opacity: 0; transform: scale(0.5); transition: all 0.1s ease; z-index: 80;
            pointer-events: none;
        }
        .combo-bounce { opacity: 1 !important; transform: scale(1.2) !important; }

        /* ✨ パーティクル修正：ランダムな方向（上向きに散らばる） */
        .particle {
            position: absolute; 
            width: 55px; height: 55px;
            background: url('mochi_particle.png') center/contain no-repeat;
            display: flex; justify-content: center; align-items: center;
            color: #e65100; font-size: 16px; font-weight: bold;
            pointer-events: none; 
            animation: floatUpRandom 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
            z-index: 999;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff;
        }
        @keyframes floatUpRandom {
            0% { transform: translate(-50%, -50%) translate(0, 0) scale(0.7); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--rand-x), var(--rand-y)) scale(1.1); opacity: 0; }
        }

        /* フィーバー用：画面に出現する「金もち」ボタン */
        #fever-pop {
            position: absolute;
            width: 65px; height: 65px;
            background: url('mochi_particle.png') center/contain no-repeat;
            filter: hue-rotate(45deg) brightness(1.3) drop-shadow(0 0 8px #ffeb3b);
            cursor: pointer; z-index: 90;
            display: flex; justify-content: center; align-items: center;
            font-size: 11px; font-weight: bold; color: #3e2723;
            animation: popSurprise 0.5s infinite alternate ease-in-out;
        }
        @keyframes popSurprise {
            0% { transform: scale(1) rotate(-5deg); }
            100% { transform: scale(1.15) rotate(5deg); }
        }

        /* 操作パネル */
        #control-panel {
            width: 100%; background: rgba(255, 255, 255, 0.95);
            padding: 15px 0; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 10;
        }
        .btn-row { display: flex; gap: 10px; width: 90%; justify-content: center; }
        
        button, select {
            padding: 10px 16px; font-size: 1rem; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15); transition: background 0.2s;
        }
        button { background: #ff9800; color: white; }
        button:hover { background: #f57c00; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        select { background: #e0f2f1; color: #00796b; }
        
        .btn-green { background: #4caf50; }
        .btn-green:hover { background: #388e3c; }
        .btn-blue { background: #2196f3; }
        .btn-blue:hover { background: #1976d2; }
        .btn-red { background: #e53935; }
        .btn-red:hover { background: #c62828; }

        /* モーダル共通設定 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 1000;
            justify-content: center; align-items: center; flex-direction: column;
        }

        /* 画面内容 */
        .modal-content {
            background: white; padding: 20px; border-radius: 12px; width: 80%; max-width: 360px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .rank-list { margin: 15px 0; text-align: left; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid #eee; }
        .my-rank { background: #fff9c4; font-weight: bold; }

        /* 両開き絵日記本 */
        .book-container {
            width: 95%; max-width: 680px; height: 460px;
            perspective: 1200px; display: flex; flex-direction: column; align-items: center;
        }
        .book {
            width: 100%; height: 100%; display: flex;
            background: #e0d0b0; border-radius: 8px; padding: 10px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4); position: relative;
        }
        .book::after {
            content: ''; position: absolute; left: 50%; top: 0; width: 4px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.3), rgba(0,0,0,0), rgba(0,0,0,0.3));
            transform: translateX(-50%); z-index: 20;
        }
        .page-left, .page-right {
            width: 50%; height: 100%; background: #fffbf0;
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;
            position: relative; z-index: 10; overflow: hidden;
        }
        .page-left {
            border-radius: 6px 0 0 6px; border-right: 1px solid rgba(0,0,0,0.1);
            justify-content: center; align-items: center;
        }
        .page-right {
            border-radius: 0 6px 6px 0; border-left: 1px solid rgba(0,0,0,0.1);
            justify-content: flex-start;
        }
        .diary-img {
            max-width: 100%; max-height: 85%; object-fit: contain;
            border: 4px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2); background: #eee;
        }
        .img-caption { margin-top: 10px; font-size: 0.85rem; font-weight: bold; color: #5d4037; text-align: center; line-height: 1.4; }
        
        .diary-title { font-size: 1.3rem; font-weight: bold; color: #5d4037; border-bottom: 2px dashed #bcaaa4; padding-bottom: 5px; }
        .diary-text { font-size: 1rem; line-height: 1.6; color: #4e342e; flex: 1; margin-top: 15px; white-space: pre-wrap; overflow-y: auto; }
        .diary-footer { text-align: right; font-size: 0.85rem; color: #8d6e63; font-weight: bold; margin-top: 5px; }

        .diary-controls { display: flex; gap: 15px; margin-top: 20px; }
        
        .page-animate { animation: pageFlipEffect 0.3s ease-in-out; }
        @keyframes pageFlipEffect {
            0% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <!-- 暗転用の黒いレイヤー -->
        <div id="fade-overlay"></div>

        <!-- ステータス表示 -->
        <div id="status-bar">
            <div class="text-large">現在の場所: <span id="current-location-text">東京</span></div>
            <div id="score-text" class="text-large">0 もち</div>
            <div id="mps-display">自動増加: 0 もち/秒</div>
            <div id="distance-text" style="font-weight: bold; color: #00796b; margin-top: 4px;">次のエリアまで: 100 もちkcal</div>
        </div>

        <!-- もちすけタップエリア -->
        <div id="mochisuke-area">
            <div id="combo-display">🔥 0 Combo!</div>
            <img id="mochisuke-btn" src="image_0.png" alt="もちすけ" draggable="false">
        </div>

        <!-- 操作パネル -->
        <div id="control-panel">
            <div class="btn-row">
                <select id="location-selector" onchange="changeLocation(this.value)">
                    <option value="0">東京</option>
                </select>
                <button id="buy-item-btn" onclick="buyLocalItem()">ご当地アイテム購入</button>
            </div>
            <div class="btn-row">
                <button class="btn-green" id="diary-open-btn" onclick="openDiary()">📖 絵日記をよむ</button>
                <button class="btn-blue" onclick="openRanking()">🏆 ランキング</button>
            </div>
        </div>
    </div>

    <!-- ランキングモーダル -->
    <div id="ranking-modal" class="modal">
        <div class="modal-content">
            <h2>🏆 もちもちランキング</h2>
            <div id="ranking-list" class="rank-list"></div>
            <button class="btn-red" onclick="closeRanking()">閉じる</button>
        </div>
    </div>

    <!-- 📖 両開き絵日記モーダル -->
    <div id="diary-modal" class="modal">
        <div class="book-container">
            <div class="book" id="diary-book">
                <div class="page-left" id="diary-left-page">
                    <img class="diary-img" id="diary-img-element" src="image_0.png" alt="絵日記の画像">
                    <div class="img-caption" id="diary-img-caption">思い出の写真</div>
                </div>
                <div class="page-right" id="diary-right-page">
                    <div class="diary-title" id="diary-title-element">東京編</div>
                    <div class="diary-text" id="diary-text-element"></div>
                    <div class="diary-footer" id="diary-footer-element">ページ: 1</div>
                </div>
            </div>
        </div>
        <div class="diary-controls">
            <button id="prev-page-btn" onclick="prevPage()">◀ もどる</button>
            <button id="next-page-btn" onclick="nextPage()">つぎへ ▶</button>
            <button class="btn-red" onclick="closeDiary()">閉じる</button>
        </div>
    </div>

    <script>
        // --- ステージ・絵日記・特殊効果データ ---
        const stages = [
            { name: "東京", distance: 100, item: "東京バナナ", price: 50, diary: "今日から日本縦断の旅が始まったぞ！\nまずは大都会東京を出発。\nこれからどんな出会いがあるかワクワクするなぁ。\nたくさん歩くぞー！", img: "tokyo_bg.png", effectDesc: "タップ力 +1", tapBonus: 1, mpsBonus: 0 },
            { name: "静岡", distance: 150, item: "うなぎパイ", price: 150, diary: "静岡に到着！\n右を見ても左を見てもお茶畑が広がっていて、空気がとっても美味しいや。\n富士山がすっごく綺麗に見えたんだ！", img: "image_0.png", effectDesc: "自動増加 +1もち/秒", tapBonus: 0, mpsBonus: 1 },
            { name: "名古屋", distance: 200, item: "天むす", price: 400, diary: "名古屋といえば金のシャチホコ！\nお城がとっても立派だったなぁ。\n夜はエビフライと手羽先を食べてお腹いっぱい。\n大満足の一日！", img: "image_0.png", effectDesc: "タップ力 +2", tapBonus: 2, mpsBonus: 0 },
            { name: "京都", distance: 180, item: "生八ツ橋", price: 800, diary: "京都の古い街並みをのんびりお散歩したよ。\nお寺がたくさんあって静かで落ち着く場所だなぁ。\n抹茶のスイーツがとっても美味しかった！", img: "image_0.png", effectDesc: "自動増加 +5もち/秒", tapBonus: 0, mpsBonus: 5 },
            { name: "大阪", distance: 100, item: "たこ焼き", price: 1500, diary: "ついに大阪にやってきたで！\n街の看板がどれもド派手でびっくりしちゃった。\n本場のたこ焼きは外がカリカリ、中がトロトロで最高！", img: "image_0.png", effectDesc: "タップ力 +5", tapBonus: 5, mpsBonus: 0 }
        ];

        // --- セーブデータ用変数 ---
        let score = 0; 
        let currentStageIndex = 0;     
        let selectedStageIndex = 0;    
        let currentStageProgress = 0;   
        let purchasedItems = {};       

        // --- フィーバーシステム用変数 ---
        let isFever = false;
        let feverTimeLeft = 0;
        let feverInterval = null;

        // --- 🔥 コンボシステム用変数 ---
        let comboCount = 0;
        let comboTimer = null;

        window.onload = function() {
            updateDisplay();
            buildLocationSelector();
            startFeverSpawningLoop();
        };

        // 特殊効果＆コンボボーナスを計算する関数
        function getTapPower() {
            let power = 1; 
            stages.forEach((stage, idx) => {
                if (purchasedItems[idx]) power += stage.tapBonus;
            });
            
            // 💡【ロジック】10コンボ毎にタップ力+1のボーナス加算
            if (comboCount >= 10) {
                power += Math.floor(comboCount / 10);
            }

            if (isFever) power *= 5;
            return power;
        }

        function getMps() {
            let mps = 0; 
            stages.forEach((stage, idx) => {
                if (purchasedItems[idx]) mps += stage.mpsBonus;
            });
            return mps;
        }

        // 1. 重複タップ音再生機能
        function playTapSound() {
            const audio = new Audio('tap.mp3');
            audio.volume = 0.6;
            audio.play().catch(e => console.log("オーディオ再生制限中"));
        }

        // 🎬 エリア移動演出（フェードアウト・イン＆移動音）
        function triggerAreaTransition(newBgUrl, callback) {
            const overlay = document.getElementById('fade-overlay');
            
            // 移動音の再生
            const moveAudio = new Audio('move.mp3');
            moveAudio.volume = 0.6;
            moveAudio.play().catch(e => console.log("移動音再生制限中"));

            // 画面を黒く暗転
            overlay.classList.add('fade-black');

            setTimeout(() => {
                // 暗転裏で背景画像とステージデータを書き換え
                callback();
                document.getElementById('game-screen').style.background = `url('${newBgUrl}') center/cover no-repeat`;
                
                // 画面を再び明るくする
                setTimeout(() => {
                    overlay.classList.remove('fade-black');
                }, 150);
            }, 300); // 0.3秒かけてフェードアウト
        }

        // 2. パーティクル生成（上方向・ランダム散らばり）
        function createParticle(x, y, text) {
            const gameScreen = document.getElementById('game-screen');
            const rect = gameScreen.getBoundingClientRect();

            const relativeX = x - rect.left;
            const relativeY = y - rect.top;

            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = text;
            p.style.left = relativeX + 'px';
            p.style.top = relativeY + 'px';
            
            // 💡【物理演出】左右に-60px〜60px、上方向に-100px〜-170pxのランダムな軌道を注入
            const randX = (Math.random() - 0.5) * 120 + 'px';
            const randY = -(Math.random() * 70 + 100) + 'px';
            p.style.setProperty('--rand-x', randX);
            p.style.setProperty('--rand-y', randY);

            gameScreen.appendChild(p);
            p.addEventListener('animationend', () => { p.remove(); });
        }

        // 🔥 コンボカウントを回す関数
        function handleCombo() {
            comboCount++;
            const comboEl = document.getElementById('combo-display');
            comboEl.innerText = `🔥 ${comboCount} Combo!`;
            
            // 文字をピコッと跳ねさせる演出
            comboEl.classList.remove('combo-bounce');
            void comboEl.offsetWidth;
            comboEl.classList.add('combo-bounce');

            // 1.2秒タップが途切れたらコンボ終了
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                comboCount = 0;
                comboEl.classList.remove('combo-bounce');
            }, 1200);
        }

        // もちすけクリック処理
        document.getElementById('mochisuke-btn').addEventListener('click', (e) => {
            playTapSound();
            handleCombo(); // コンボをカウントアップ
            
            const currentTapPower = getTapPower();
            createParticle(e.clientX, e.clientY, `+${currentTapPower}`);

            if (selectedStageIndex === currentStageIndex && currentStageIndex < stages.length) {
                score += currentTapPower;
                currentStageProgress += currentTapPower;
                checkStageProgress();
            } else {
                score += currentTapPower; 
            }

            updateDisplay();
        });

        // ゴールドもちのランダム出現システム
        function startFeverSpawningLoop() {
            setInterval(() => {
                if (isFever || document.getElementById('fever-pop')) return;
                if (Math.random() < 0.5) {
                    spawnGoldMochi();
                }
            }, 15000);
        }

        function spawnGoldMochi() {
            const area = document.getElementById('mochisuke-area');
            const goldMochi = document.createElement('div');
            goldMochi.id = 'fever-pop';
            goldMochi.innerText = "✨金✨";

            const rect = area.getBoundingClientRect();
            const x = Math.random() * (rect.width - 80) + 40;
            const y = Math.random() * (rect.height - 80) + 40;
            goldMochi.style.left = x + 'px';
            goldMochi.style.top = y + 'px';

            goldMochi.addEventListener('click', (e) => {
                e.stopPropagation();
                goldMochi.remove();
                triggerFeverTime();
            });

            area.appendChild(goldMochi);

            setTimeout(() => {
                if (document.getElementById('fever-pop') === goldMochi) {
                    goldMochi.remove();
                }
            }, 6000);
        }

        function triggerFeverTime() {
            isFever = true;
            feverTimeLeft = 10;
            document.getElementById('status-bar').classList.add('fever-active');
            updateDisplay();

            if (feverInterval) clearInterval(feverInterval);
            feverInterval = setInterval(() => {
                feverTimeLeft--;
                if (feverTimeLeft <= 0) {
                    clearInterval(feverInterval);
                    isFever = false;
                    document.getElementById('status-bar').classList.remove('fever-active');
                }
                updateDisplay();
            }, 1000);
        }

        // ステージ進行管理
        function checkStageProgress() {
            if (currentStageProgress >= stages[currentStageIndex].distance) {
                if (currentStageIndex < stages.length - 1) {
                    currentStageIndex++;
                    const nextIdx = currentStageIndex;
                    currentStageProgress = 0;
                    
                    // 🎬 次のエリアへ自動進出するときに暗転演出を挟む
                    triggerAreaTransition(stages[nextIdx].img, () => {
                        selectedStageIndex = nextIdx;
                        alert(`新エリア「${stages[nextIdx].name}」に到達しました！`);
                        buildLocationSelector();
                        updateDisplay();
                    });
                } else {
                    currentStageProgress = stages[currentStageIndex].distance;
                }
            }
        }

        // 画面表示更新
        function updateDisplay() {
            if (isFever) {
                document.getElementById('score-text').innerHTML = `🔥 5倍フィーバー中！ (${feverTimeLeft}秒) 🔥<br>${Math.floor(score).toLocaleString()} もち`;
            } else {
                document.getElementById('score-text').innerText = Math.floor(score).toLocaleString() + " もち";
            }

            document.getElementById('current-location-text').innerText = stages[selectedStageIndex].name;
            document.getElementById('mps-display').innerText = `自動増加: ${getMps()} もち/秒 (現在タップ力: +${getTapPower()})`;

            const buyBtn = document.getElementById('buy-item-btn');
            const activeStage = stages[selectedStageIndex];

            if (purchasedItems[selectedStageIndex]) {
                buyBtn.innerText = `購入済: ${activeStage.item} (${activeStage.effectDesc})`;
                buyBtn.disabled = true;
            } else {
                buyBtn.innerText = `${activeStage.item}を買う (${activeStage.price}もち)\n【効果: ${activeStage.effectDesc}】`;
                buyBtn.disabled = score < activeStage.price;
            }

            const distText = document.getElementById('distance-text');
            if (selectedStageIndex < currentStageIndex) {
                distText.innerText = "このエリアは踏破済みです";
            } else if (currentStageIndex === stages.length - 1 && currentStageProgress >= stages[currentStageIndex].distance) {
                distText.innerText = "🎉 日本縦断ゴール達成！！";
            } else {
                const remaining = Math.ceil(stages[currentStageIndex].distance - currentStageProgress);
                distText.innerText = `次のエリアまで: ${remaining} もちkcal`;
            }
        }

        // エリア選択肢の構築
        function buildLocationSelector() {
            const selector = document.getElementById('location-selector');
            selector.innerHTML = "";
            for (let i = 0; i <= currentStageIndex; i++) {
                if (i < stages.length) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.text = stages[i].name;
                    if (i === selectedStageIndex) opt.selected = true;
                    selector.appendChild(opt);
                }
            }
        }

        // 手動エリア切り替え
        function changeLocation(index) {
            const idx = parseInt(index);
            // 🎬 手動で過去のエリアに戻る/進むときも暗転フェードをかける
            triggerAreaTransition(stages[idx].img, () => {
                selectedStageIndex = idx;
                updateDisplay();
            });
        }

        function buyLocalItem() {
            const activeStage = stages[selectedStageIndex];
            if (score >= activeStage.price && !purchasedItems[selectedStageIndex]) {
                score -= activeStage.price;
                purchasedItems[selectedStageIndex] = true;
                alert(`「${activeStage.item}」を購入しました！\n特殊効果【${activeStage.effectDesc}】が発動しました！`);
                updateDisplay();
            }
        }

        // ランキング機能
        function openRanking() {
            let listContainer = document.getElementById('ranking-list');
            let dummyRanks = [
                { name: "もちマスター", score: 999999, isMe: false },
                { name: "ポチポチ神", score: 50000, isMe: false },
                { name: "あなた (もちすけ)", score: Math.floor(score), isMe: true },
                { name: "ビギナーもち", score: 10, isMe: false }
            ];

            dummyRanks.sort((a, b) => b.score - a.score);
            listContainer.innerHTML = "";
            dummyRanks.forEach((player, index) => {
                let item = document.createElement('div');
                item.className = player.isMe ? "rank-item my-rank" : "rank-item";
                item.innerHTML = `<span>${index + 1}位. ${player.name}</span><span>${player.score.toLocaleString()} もち</span>`;
                listContainer.appendChild(item);
            });
            document.getElementById('ranking-modal').style.display = "flex";
        }

        // ランキング閉じる
        function closeRanking() { document.getElementById('ranking-modal').style.display = "none"; }

        // 自動増加（MPS）用タイマー
        setInterval(() => {
            let mps = getMps();
            if (mps > 0) {
                let gain = mps / 10;
                score += gain;
                if (selectedStageIndex === currentStageIndex && currentStageIndex < stages.length) {
                    currentStageProgress += gain;
                    checkStageProgress();
                }
                updateDisplay();
            }
        }, 100);

        // --- 📖 両開き絵日記システム ---
        let diaryPageIndex = 0;

        function openDiary() {
            diaryPageIndex = selectedStageIndex; 
            renderDiaryPage();
            document.getElementById('diary-modal').style.display = "flex";
        }

        function closeDiary() { document.getElementById('diary-modal').style.display = "none"; }

        function renderDiaryPage() {
            const stage = stages[diaryPageIndex];
            const book = document.getElementById('diary-book');
            
            book.classList.remove('page-animate');
            void book.offsetWidth; 
            book.classList.add('page-animate');

            const hasItemText = purchasedItems[diaryPageIndex] ? `🛍️ ご当地アイテム: ${stage.item}\n(効果: ${stage.effectDesc} 有効)` : "🛍️ ご当地アイテム: 未購入";
            document.getElementById('diary-img-element').src = stage.img; 
            document.getElementById('diary-img-caption').innerText = `【${stage.name}の思い出】\n${hasItemText}`;

            document.getElementById('diary-title-element').innerText = `${stage.name}編`;
            document.getElementById('diary-text-element').innerText = stage.diary;
            document.getElementById('diary-footer-element').innerText = `ページ: ${diaryPageIndex + 1} / ${currentStageIndex + 1}`;

            document.getElementById('prev-page-btn').disabled = (diaryPageIndex === 0);
            document.getElementById('next-page-btn').disabled = (diaryPageIndex === currentStageIndex || diaryPageIndex === stages.length - 1);
        }

        function nextPage() {
            if (diaryPageIndex < currentStageIndex && diaryPageIndex < stages.length - 1) {
                diaryPageIndex++;
                renderDiaryPage();
            }
        }

        // 日記戻る
        function prevPage() {
            if (diaryPageIndex > 0) {
                diaryPageIndex--;
                renderDiaryPage();
            }
        }
    </script>
</body>
</html>
